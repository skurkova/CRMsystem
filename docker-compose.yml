services:
  db:
    image: postgres:14-alpine
    container_name: crm_db
    env_file:
      - .env
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d crm_db -U crm_user" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - crm_network

  django:
    build: .
    container_name: crm_django
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py create_user_groups_permissions &&
             python manage.py create_superuser &&
             gunicorn CRMsystem.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/app
      - ./staticfiles:/app/staticfiles
      - ./uploads:/app/uploads
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DEBUG=1
    networks:
      - crm_network

volumes:
  postgres_data:

networks:
  crm_network:
    driver: bridge