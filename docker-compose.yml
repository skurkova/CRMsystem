services:
  db:
    image: postgres:14-alpine
    container_name: crm_db
    environment:
      - POSTGRES_DB=crm_db
      - POSTGRES_USER=crm_user
      - POSTGRES_PASSWORD=admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d crm_db -U crm_user" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - crm_network

  django:
    build: .
    container_name: crm_django
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             python manage.py create_user_groups_permissions &&
             python manage.py create_superuser &&
             gunicorn CRMsystem.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/uploads
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=crm_db
      - DB_USER=crm_user
      - DB_PASSWORD=admin
      - DB_HOST=db
      - DB_PORT=5432
      - DEBUG=0
      - SECRET_KEY=your-secret-key-here
    networks:
      - crm_network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  crm_network:
    driver: bridge